services:
  - name: ttsaver-bot
    type: web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ALLOWED_USER_IDS
        sync: false
      - key: ADMIN_USER_IDS
        sync: false
      - key: TEMP_DIR
        value: ./data/temp
      - key: DB_PATH
        value: ./data/app.db
      - key: MAX_VIDEO_SIZE_MB
        value: "50"
      - key: CACHE_TTL_HOURS
        value: "72"
      - key: REQUESTS_PER_USER_PER_DAY
        value: "20"
      - key: CLEANUP_MAX_AGE_HOURS
        value: "12"
      - key: LOG_LEVEL
        value: INFO
      - key: FFMPEG_PATH
        value: /usr/bin/ffmpeg
      - key: DOWNLOAD_TIMEOUT_SEC
        value: "180"
      - key: FFMPEG_TIMEOUT_SEC
        value: "180"
      - key: HEALTH_HOST
        value: 0.0.0.0
      - key: PORT
        value: "10000"
